# Render.com 배포 설정 (Blueprint)
# 대시보드에서 New + > Blueprint 로 이 저장소를 연결하면 자동 인식됩니다.
services:
  - type: web
    name: justice
    runtime: docker
    plan: starter            # 디스크/상시가동을 위해 유료 플랜 필요 (무료는 잠들고 디스크 없음)
    region: singapore        # 한국에서 가장 가까운 리전
    healthCheckPath: /login
    envVars:
      - key: APP_PASSWORD    # 직원들과 공유할 공용 비밀번호 (대시보드에서 직접 입력)
        sync: false
      - key: SECRET_KEY      # 세션 암호화 키 (자동 생성)
        generateValue: true
      - key: DB_PATH
        value: /data/justice.db
    disk:
      name: justice-data     # SQLite DB 영구 저장 (재배포해도 보존)
      mountPath: /data
      sizeGB: 1
