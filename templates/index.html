<!DOCTYPE html>
<html lang="ko" data-bs-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUSTICE - 네이버 플레이스 순위 관리</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<script>
  // 새로고침 시 테마 깜빡임 방지 (렌더 전에 적용)
  document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'light');
</script>
<style>
  /* ── 라이트(기본) ─────────────────────────────── */
  :root, [data-bs-theme="light"] {
    --brand: #4f6bed; --brand-dark: #3b53d6; --green: #03C75A;
    --bg: #eef1f6; --panel: #ffffff; --panel-2: #f4f6fb;
    --text: #1a2233; --muted: #7b8699; --border: #e6e9f0;
    --shadow: 0 2px 10px rgba(20,30,60,.06);
    --card-border: #c4ccdb; --card-shadow: 0 1px 2px rgba(16,24,48,.10), 0 6px 18px rgba(16,24,48,.10);
  }
  /* ── 다크 ─────────────────────────────────────── */
  [data-bs-theme="dark"] {
    --brand: #5b7cfa; --brand-dark: #4f6bed; --green: #16c784;
    --bg: #0b1020; --panel: #131a2c; --panel-2: #1a2337;
    --text: #e6ebf5; --muted: #8a97b4; --border: #263050;
    --shadow: 0 4px 16px rgba(0,0,0,.35);
    --card-border: #34406a; --card-shadow: 0 4px 18px rgba(0,0,0,.42);
  }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; transition: background .2s, color .2s; }
  .text-muted { color: var(--muted) !important; }
  .navbar { background: var(--panel); border-bottom: 1px solid var(--border); }
  .navbar-brand { color: var(--brand) !important; font-weight: 800; font-size: 1.3rem; }
  .stat-card { background: var(--panel); border: 1.5px solid var(--card-border); border-radius: 14px; padding: 1.2rem 1.5rem;
                box-shadow: var(--card-shadow); border-left: 4px solid var(--brand); }
  .stat-card .num { font-size: 2rem; font-weight: 700; color: var(--text); }
  .stat-card .label { color: var(--muted); font-size: .85rem; }
  .client-card { background: var(--panel); border: 1.5px solid var(--card-border); border-radius: 14px; box-shadow: var(--card-shadow);
                  margin-bottom: 1.4rem; overflow: hidden; }
  .client-header { background: var(--panel-2); padding: .8rem 1.25rem; border-bottom: 1.5px solid var(--card-border);
                    display: flex; align-items: center; gap: .5rem; }
  .client-header .place-id { font-size: .75rem; color: var(--muted); }
  .kw-row { padding: .6rem 1.25rem; border-bottom: 1px solid var(--border); }
  .kw-row:last-child { border-bottom: none; }
  .progress { height: 8px; border-radius: 4px; background: var(--panel-2); }
  .progress-bar { background: var(--brand); }
  .progress-bar.done { background: #f5a623; }
  .badge-active { background: rgba(79,107,237,.16); color: var(--brand); }
  .badge-done { background: rgba(245,166,35,.18); color: #f5a623; }
  .badge-exposed { background: rgba(3,199,90,.16); color: var(--green); font-size: .7rem; }
  .noti-dot { width: 8px; height: 8px; background: #e5484d; border-radius: 50%;
               position: absolute; top: 4px; right: 4px; }
  .noti-item { padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
  .noti-item.unread { background: rgba(245,166,35,.10); border-left: 3px solid #f5a623; }
  .noti-item.read { opacity: .6; }
  .log-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }
  .log-dot.exposed { background: var(--green); }
  .log-dot.not-exposed { background: var(--border); }
  .btn-naver { background: var(--brand); color: #fff; border: none; }
  .btn-naver:hover { background: var(--brand-dark); color: #fff; }
  .crawl-spinner { display: none; }
  .crawl-spinner.active { display: inline-block; }
  #toastContainer { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; }
  .section-title { font-weight: 700; font-size: 1rem; color: var(--text); margin-bottom: .75rem; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
  .checking { animation: pulse 1s infinite; color: #f5a623; }
  @keyframes blink { 0%,100%{opacity:1; box-shadow:0 0 0 0 rgba(245,166,35,.7)} 50%{opacity:.55; box-shadow:0 0 0 4px rgba(245,166,35,0)} }
  .blink { animation: blink 1s ease-in-out infinite; }
  .row-pending { background: rgba(245,166,35,.08); border-left: 3px solid #f5a623; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg px-4 py-2">
  <span class="navbar-brand"><i class="bi bi-geo-alt-fill"></i> JUSTICE</span>
  <span class="text-muted small ms-2">네이버 플레이스 순위 보장 관리</span>
  <div class="ms-auto d-flex align-items-center gap-3">
    <span class="text-muted small" id="lastRunLabel"></span>
    <div class="btn-group btn-group-sm" role="group" aria-label="테마 전환">
      <button type="button" class="btn btn-outline-secondary" id="themeBtnLight" onclick="applyTheme('light')">
        <i class="bi bi-sun-fill"></i> 화이트모드
      </button>
      <button type="button" class="btn btn-outline-secondary" id="themeBtnDark" onclick="applyTheme('dark')">
        <i class="bi bi-moon-stars-fill"></i> 다크모드
      </button>
    </div>
    <button class="btn btn-sm btn-naver" id="btnCheck" onclick="runManualCheck()">
      <i class="bi bi-arrow-clockwise"></i>
      <span class="crawl-spinner spinner-border spinner-border-sm" id="checkSpinner" role="status"></span>
      전체 체크
    </button>
    <div class="position-relative" style="cursor:pointer" onclick="openNotifications()">
      <i class="bi bi-bell-fill fs-5 text-secondary"></i>
      <span class="noti-dot" id="notiDot" style="display:none"></span>
    </div>
    <button class="btn btn-sm btn-outline-secondary" onclick="openAddClient()">
      <i class="bi bi-plus-circle"></i> 업체 등록
    </button>
    <a class="btn btn-sm btn-outline-secondary" href="/logout" title="로그아웃">
      <i class="bi bi-box-arrow-right"></i>
    </a>
  </div>
</nav>

<div class="container-fluid px-4 py-3">

  <!-- Stats -->
  <div class="row g-3 mb-4" id="statsRow">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="num" id="statClients">-</div>
        <div class="label">등록 업체</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="border-color:#0d6efd">
        <div class="num" id="statActive">-</div>
        <div class="label">진행 중 키워드</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="border-color:#ffc107">
        <div class="num" id="statDone">-</div>
        <div class="label">결제 요청 대기</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="border-color:#dc3545">
        <div class="num" id="statNoti">-</div>
        <div class="label">미확인 알림</div>
      </div>
    </div>
  </div>

  <!-- Client List -->
  <div class="section-title"><i class="bi bi-building"></i> 업체 목록</div>
  <div id="clientList"></div>

</div>

<!-- Toast -->
<div id="toastContainer"></div>

<!-- Modal: 업체 등록 -->
<div class="modal fade" id="addClientModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">업체 등록</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label fw-bold">업체명 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="inputName" placeholder="예: 홍길동 치킨">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">네이버 플레이스 URL <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="inputUrl"
                 placeholder="예: https://map.naver.com/p/entry/place/1234567890"
                 oninput="previewPlaceId()">
          <div class="form-text text-muted">네이버 지도에서 업체 클릭 후 주소창의 URL을 붙여넣으세요</div>
          <div id="placeIdPreview" class="mt-1"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">메모 (선택)</label>
          <input type="text" class="form-control" id="inputMemo" placeholder="담당자, 연락처 등">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">검색어 (첫 번째)</label>
          <input type="text" class="form-control" id="inputKeyword" placeholder="예: 강남 치킨">
          <div class="form-text">업체 등록 후 언제든지 검색어를 추가할 수 있습니다</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-naver" onclick="submitAddClient()">등록하기</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: 검색어 추가 -->
<div class="modal fade" id="addKeywordModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">검색어 추가</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="kwClientId">
        <div class="mb-2">
          <label class="form-label">검색어 <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="inputNewKeyword" placeholder="예: 강남 맛집">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">취소</button>
        <button class="btn btn-naver" onclick="submitAddKeyword()">추가</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: 알림 -->
<div class="modal fade" id="notiModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-bell-fill text-warning"></i> 알림</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0" id="notiList" style="max-height:500px;overflow-y:auto"></div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-outline-secondary" onclick="markAllRead()">모두 읽음</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: 트래킹 로그 -->
<div class="modal fade" id="logModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="logModalTitle">노출 기록</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="logModalBody"></div>
    </div>
  </div>
</div>

<!-- Modal: 월별 순위표 (구글시트 복사용) -->
<div class="modal fade" id="sheetModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="sheetModalTitle">월별 순위표</h5>
        <div class="ms-auto d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-secondary" onclick="sheetMonth(-1)"><i class="bi bi-chevron-left"></i></button>
          <span id="sheetMonthLabel" class="small fw-bold"></span>
          <button class="btn btn-sm btn-outline-secondary" onclick="sheetMonth(1)"><i class="bi bi-chevron-right"></i></button>
          <button class="btn btn-sm btn-naver" onclick="copySheet()"><i class="bi bi-clipboard-check"></i> 복사</button>
          <button type="button" class="btn-close ms-1" data-bs-dismiss="modal"></button>
        </div>
      </div>
      <div class="modal-body" id="sheetModalBody" style="overflow-x:auto"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const modals = {};
['addClientModal','addKeywordModal','notiModal','logModal','sheetModal'].forEach(id => {
  modals[id] = new bootstrap.Modal(document.getElementById(id));
});

// ── 테마 (다크 / 화이트) ──────────────────────────────────────────────────────

function applyTheme(t) {
  document.documentElement.setAttribute('data-bs-theme', t);
  localStorage.setItem('theme', t);
  const lb = document.getElementById('themeBtnLight');
  const db = document.getElementById('themeBtnDark');
  if (lb && db) {
    lb.className = 'btn ' + (t === 'light' ? 'btn-naver' : 'btn-outline-secondary');
    db.className = 'btn ' + (t === 'dark' ? 'btn-naver' : 'btn-outline-secondary');
  }
}
applyTheme(localStorage.getItem('theme') || 'light');

// ── API 헬퍼 ────────────────────────────────────────────────────────────────

async function api(url, opts={}) {
  const res = await fetch(url, {
    headers: {'Content-Type':'application/json'},
    ...opts
  });
  if (res.status === 401) { window.location = '/login'; throw new Error('로그인이 필요합니다'); }
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || '오류가 발생했습니다');
  return data;
}

// ── 대시보드 로드 ────────────────────────────────────────────────────────────

async function loadDashboard() {
  const data = await api('/api/dashboard');
  const s = data.stats;

  document.getElementById('statClients').textContent = s.total_clients;
  document.getElementById('statActive').textContent = s.active_keywords;
  document.getElementById('statDone').textContent = s.payment_pending;
  document.getElementById('statNoti').textContent = s.unread_notifications;

  const notiDot = document.getElementById('notiDot');
  notiDot.style.display = s.unread_notifications > 0 ? 'block' : 'none';

  renderClients(data.clients);
  pollCrawlStatus();
}

let lastClientsJson = '';
function renderClients(clients) {
  const container = document.getElementById('clientList');
  // 데이터가 그대로면 다시 그리지 않음 (버튼 깜빡임/클릭 씹힘 방지)
  const json = JSON.stringify(clients);
  if (json === lastClientsJson && container.children.length) return;
  lastClientsJson = json;
  if (!clients.length) {
    container.innerHTML = `<div class="text-center text-muted py-5">
      <i class="bi bi-building fs-1 d-block mb-2"></i>등록된 업체가 없습니다
      <br><button class="btn btn-sm btn-naver mt-2" onclick="openAddClient()">업체 등록하기</button>
    </div>`;
    return;
  }

  container.innerHTML = clients.map(c => `
    <div class="client-card" id="client-${c.id}">
      <div class="client-header">
        <i class="bi bi-building-fill text-success"></i>
        <strong>${esc(c.name)}</strong>
        <span class="place-id ms-1">ID: ${esc(c.place_id)}</span>
        ${c.place_name ? `<span class="place-id ms-1" title="순위 매칭에 사용되는 업체명">· ${esc(c.place_name)}</span>` : ''}
        ${c.memo ? `<span class="text-muted small ms-2">${esc(c.memo)}</span>` : ''}
        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-sm btn-outline-dark py-0 px-2" onclick="openSheet(${c.id},'${esc(c.name)}')" title="구글시트 복사용 월별 순위표">
            <i class="bi bi-table"></i> 시트
          </button>
          <a href="${esc(c.place_url)}" target="_blank" class="btn btn-sm btn-outline-success py-0 px-2">
            <i class="bi bi-box-arrow-up-right"></i>
          </a>
          <button class="btn btn-sm btn-outline-primary py-0 px-2" onclick="openAddKeyword(${c.id})">
            <i class="bi bi-plus"></i> 검색어
          </button>
          <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="confirmDeleteClient(${c.id},'${esc(c.name)}')">
            <i class="bi bi-trash"></i>
          </button>
        </div>
      </div>
      ${c.keywords.length === 0
        ? `<div class="kw-row text-muted small">등록된 검색어 없음</div>`
        : c.keywords.map(k => renderKeywordRow(k)).join('')
      }
    </div>
  `).join('');
}

function currentRankBadge(rank, exposed) {
  if (rank === null || rank === undefined) return `<span class="badge bg-light text-muted">현재 순위 미확인</span>`;
  const cls = exposed ? 'badge-exposed' : 'bg-light text-muted';
  return `<span class="badge ${cls}">📍 현재 순위 ${rank}위</span>`;
}

function renderKeywordRow(k) {
  const pct = Math.min(k.progress, 100);
  const pending = k.payment_pending;
  // 상태 배지: 결제 대기 > 진행중(N회 완료)
  let badgeCls, badgeText;
  if (pending) { badgeCls = 'badge-done'; badgeText = '💳 결제요청'; }
  else if (k.cycle_count > 0) { badgeCls = 'badge-active'; badgeText = `진행중 · ${k.cycle_count}회 완료`; }
  else { badgeCls = 'badge-active'; badgeText = '진행중'; }
  const barCls = pending ? 'done' : '';

  const todayBadges = currentRankBadge(k.today_pc_rank, k.today_pc_exposed);

  // 결제완료 버튼: 결제 대기일 때만 표시하고 깜빡임
  const payBtn = pending
    ? `<button class="btn btn-sm btn-warning py-0 px-2 blink fw-bold" onclick="markPaymentComplete(${k.id},'${esc(k.keyword)}')" title="결제가 확인되면 누르세요">
         <i class="bi bi-cash-coin"></i> 결제완료
       </button>`
    : '';

  return `
    <div class="kw-row d-flex align-items-center gap-2 flex-wrap${pending ? ' row-pending' : ''}">
      <span class="badge ${badgeCls} rounded-pill">${badgeText}</span>
      <strong class="me-1">${esc(k.keyword)}</strong>
      <div class="flex-grow-1" style="min-width:120px">
        <div class="progress">
          <div class="progress-bar ${barCls}" style="width:${pct}%"></div>
        </div>
      </div>
      <span class="small text-muted" style="min-width:80px">
        ${k.exposure_count} / ${k.goal_days}일
        ${k.manual_days ? `<span class="text-info" title="수기 입력 시작 일수">(수기 ${k.manual_days})</span>` : ''}
      </span>
      <span class="d-flex gap-1">${todayBadges}</span>
      ${k.completed_at ? `<span class="small fw-bold ${pending ? 'text-danger' : 'text-success'}" title="가장 최근 25일 보장 달성일">🎯 보장완료: ${k.completed_at}</span>` : ''}
      ${k.last_paid_at && !pending ? `<span class="small text-muted">결제완료: ${k.last_paid_at}</span>` : ''}
      ${payBtn}
      <button class="btn btn-sm btn-outline-info py-0 px-2" onclick="setManualDays(${k.id}, ${k.manual_days || 0}, '${esc(k.keyword)}')" title="수기 노출일 입력">
        <i class="bi bi-pencil-square"></i>
      </button>
      <button class="btn btn-sm btn-outline-secondary py-0 px-2" onclick="viewLogs(${k.id},'${esc(k.keyword)}')">
        <i class="bi bi-graph-up"></i>
      </button>
      <button class="btn btn-sm btn-outline-success py-0 px-2" onclick="checkSingle(${k.id},'${esc(k.keyword)}')" title="즉시 체크">
        <i class="bi bi-search"></i>
      </button>
      <button class="btn btn-sm btn-outline-danger py-0 px-2" onclick="confirmDeleteKeyword(${k.id},'${esc(k.keyword)}')">
        <i class="bi bi-x"></i>
      </button>
    </div>
  `;
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// ── 업체 등록 ────────────────────────────────────────────────────────────────

function openAddClient() { modals.addClientModal.show(); }

function previewPlaceId() {
  const url = document.getElementById('inputUrl').value;
  const preview = document.getElementById('placeIdPreview');
  const m = url.match(/\/(?:entry\/)?place\/(\d+)/);
  if (m) {
    preview.innerHTML = `<span class="text-success small"><i class="bi bi-check-circle-fill"></i> 업체 ID: <strong>${m[1]}</strong></span>`;
  } else if (url.length > 10) {
    preview.innerHTML = `<span class="text-danger small"><i class="bi bi-exclamation-circle"></i> 유효한 네이버 플레이스 URL이 아닙니다</span>`;
  } else {
    preview.innerHTML = '';
  }
}

async function submitAddClient() {
  const name = document.getElementById('inputName').value.trim();
  const place_url = document.getElementById('inputUrl').value.trim();
  const memo = document.getElementById('inputMemo').value.trim();
  const keyword = document.getElementById('inputKeyword').value.trim();

  if (!name || !place_url) { showToast('업체명과 URL을 입력하세요', 'danger'); return; }

  try {
    const client = await api('/api/clients', { method:'POST', body: JSON.stringify({name, place_url, memo}) });
    if (keyword) {
      await api(`/api/clients/${client.id}/keywords`, { method:'POST', body: JSON.stringify({keyword}) });
    }
    modals.addClientModal.hide();
    clearAddForm();
    showToast('업체가 등록되었습니다', 'success');
    loadDashboard();
  } catch(e) {
    showToast(e.message, 'danger');
  }
}

function clearAddForm() {
  ['inputName','inputUrl','inputMemo','inputKeyword'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('placeIdPreview').innerHTML = '';
}

// ── 검색어 추가 ──────────────────────────────────────────────────────────────

function openAddKeyword(clientId) {
  document.getElementById('kwClientId').value = clientId;
  document.getElementById('inputNewKeyword').value = '';
  modals.addKeywordModal.show();
}

async function submitAddKeyword() {
  const clientId = document.getElementById('kwClientId').value;
  const keyword = document.getElementById('inputNewKeyword').value.trim();
  if (!keyword) { showToast('검색어를 입력하세요', 'danger'); return; }
  try {
    await api(`/api/clients/${clientId}/keywords`, { method:'POST', body: JSON.stringify({keyword}) });
    modals.addKeywordModal.hide();
    showToast('검색어가 추가되었습니다', 'success');
    loadDashboard();
  } catch(e) {
    showToast(e.message, 'danger');
  }
}

// ── 삭제 ─────────────────────────────────────────────────────────────────────

function confirmDeleteClient(id, name) {
  if (!confirm(`[${name}] 업체를 삭제하시겠습니까?\n모든 검색어와 트래킹 데이터가 삭제됩니다.`)) return;
  api(`/api/clients/${id}`, {method:'DELETE'}).then(() => {
    showToast('삭제되었습니다', 'secondary');
    loadDashboard();
  });
}

function confirmDeleteKeyword(id, kw) {
  if (!confirm(`[${kw}] 검색어를 삭제하시겠습니까?`)) return;
  api(`/api/keywords/${id}`, {method:'DELETE'}).then(() => {
    showToast('삭제되었습니다', 'secondary');
    loadDashboard();
  });
}

// ── 크롤링 ───────────────────────────────────────────────────────────────────

async function runManualCheck() {
  const btn = document.getElementById('btnCheck');
  const spinner = document.getElementById('checkSpinner');
  btn.disabled = true;
  spinner.classList.add('active');
  try {
    await api('/api/check', {method:'POST'});
    showToast('순위 체크를 시작했습니다. 완료까지 수 분이 걸릴 수 있습니다.', 'info');
    pollCrawlStatus();
  } catch(e) {
    showToast(e.message, 'warning');
    btn.disabled = false;
    spinner.classList.remove('active');
  }
}

async function checkSingle(kwId, kwText) {
  if (!confirm(`[${kwText}] 키워드를 지금 즉시 체크하시겠습니까?`)) return;
  showToast(`[${kwText}] 체크 중...`, 'info');
  try {
    const r = await api('/api/check/single', {method:'POST', body: JSON.stringify({keyword_id: kwId})});
    const rankStr = (r.rank === null || r.rank === undefined) ? '미노출' : `현재 ${r.rank}위`;
    const exposed = r.is_exposed ? '✅ 노출' : '❌ 미노출';
    const msg = (r.error && r.rank === null)
      ? `오류: ${r.error}`
      : `${exposed} · ${rankStr}${r.completed ? ' ★ 목표 달성!' : ''}`;
    showToast(`[${kwText}] ${msg}`, r.is_exposed ? 'success' : 'secondary');
    loadDashboard();
  } catch(e) {
    showToast(e.message, 'danger');
  }
}

let pollTimer;
let wasRunning = false;
async function pollCrawlStatus() {
  clearTimeout(pollTimer);
  let status;
  try { status = await api('/api/check/status'); } catch(e) { return; }
  const label = document.getElementById('lastRunLabel');
  const btn = document.getElementById('btnCheck');
  const spinner = document.getElementById('checkSpinner');

  if (status.running) {
    wasRunning = true;
    label.innerHTML = '<span class="checking"><i class="bi bi-circle-fill"></i> 체크 중...</span>';
    btn.disabled = true;
    spinner.classList.add('active');
    pollTimer = setTimeout(pollCrawlStatus, 5000);
  } else {
    btn.disabled = false;
    spinner.classList.remove('active');
    label.textContent = status.last_run ? `마지막 체크: ${status.last_run}` : '';
    // 방금 크롤링이 끝났을 때만 1회 새로고침 (무한 재렌더 방지)
    if (wasRunning) {
      wasRunning = false;
      loadDashboard();
    }
  }
}

// ── 알림 ─────────────────────────────────────────────────────────────────────

async function openNotifications() {
  const notis = await api('/api/notifications');
  const body = document.getElementById('notiList');
  if (!notis.length) {
    body.innerHTML = '<div class="text-center text-muted p-4">알림이 없습니다</div>';
  } else {
    body.innerHTML = notis.map(n => `
      <div class="noti-item ${n.is_read ? 'read' : 'unread'}" onclick="markRead(${n.id}, this)">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <span class="badge bg-warning text-dark me-1">결제 요청</span>
            <strong>${esc(n.client_name)}</strong>
            ${n.keyword ? ` / ${esc(n.keyword)}` : ''}
          </div>
          <small class="text-muted">${n.created_at.slice(0,16)}</small>
        </div>
        <div class="mt-1 text-dark">${esc(n.message)}</div>
      </div>
    `).join('');
  }
  modals.notiModal.show();
}

async function markRead(id, el) {
  await api(`/api/notifications/${id}/read`, {method:'POST'});
  el.classList.remove('unread');
  el.classList.add('read');
  loadDashboard();
}

async function markAllRead() {
  await api('/api/notifications/read-all', {method:'POST'});
  document.querySelectorAll('.noti-item').forEach(el => {
    el.classList.remove('unread'); el.classList.add('read');
  });
  loadDashboard();
}

// ── 수기 노출일 입력 ──────────────────────────────────────────────────────────

async function setManualDays(kwId, current, kwText) {
  const v = prompt(
    `[${kwText}] 지금까지 노출된 누적 일수를 입력하세요.\n` +
    `(구글시트 등에 적어두신 값. 이 값을 기준으로 이후 자동 체크가 더해집니다.)`,
    current
  );
  if (v === null) return;
  const days = parseInt(v, 10);
  if (isNaN(days) || days < 0) { showToast('0 이상의 숫자를 입력하세요', 'danger'); return; }
  try {
    const r = await api(`/api/keywords/${kwId}/manual-days`, {
      method: 'POST', body: JSON.stringify({ days })
    });
    showToast(`수기 노출일 ${days}일 저장됨${r.completed ? ' ★ 목표 달성!' : ''}`, 'success');
    loadDashboard();
  } catch(e) {
    showToast(e.message, 'danger');
  }
}

// ── 결제 완료 ─────────────────────────────────────────────────────────────────

async function markPaymentComplete(kwId, kwText) {
  if (!confirm(`[${kwText}] 결제가 확인되어 완료 처리할까요?\n(노출 보장 카운트는 이미 다음 주기로 자동 재시작됩니다.)`)) return;
  try {
    await api(`/api/keywords/${kwId}/payment-complete`, { method: 'POST' });
    showToast(`[${kwText}] 결제 완료 처리됨`, 'success');
    loadDashboard();
  } catch(e) {
    showToast(e.message, 'danger');
  }
}

// ── 트래킹 로그 ───────────────────────────────────────────────────────────────

async function viewLogs(kwId, kwText) {
  const logs = await api(`/api/keywords/${kwId}/logs`);
  document.getElementById('logModalTitle').textContent = `[${kwText}] 노출 기록`;

  if (!logs.length) {
    document.getElementById('logModalBody').innerHTML = '<p class="text-muted">기록이 없습니다</p>';
  } else {
    const fmtRank = (rank, exposed) => {
      if (rank === null || rank === undefined) return `<span class="text-muted">미노출</span>`;
      return exposed
        ? `<span class="text-success fw-bold">${rank}위 ✅</span>`
        : `<span class="text-muted">${rank}위</span>`;
    };
    const rows = logs.map(l => `
      <tr>
        <td>${l.check_date}</td>
        <td>${fmtRank(l.pc_rank, l.pc_exposed)}</td>
        <td>
          <span class="log-dot ${l.is_exposed ? 'exposed' : 'not-exposed'}"></span>
          ${l.is_exposed ? '<span class="text-success fw-bold">노출일 카운트</span>' : '<span class="text-muted">미카운트</span>'}
        </td>
      </tr>
    `).join('');
    document.getElementById('logModalBody').innerHTML = `
      <p class="text-muted small mb-2">현재 순위가 1~5위이면 노출일로 카운트됩니다.</p>
      <table class="table table-sm table-hover">
        <thead><tr><th>날짜</th><th>현재 순위</th><th>카운트</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  }
  modals.logModal.show();
}

// ── 월별 순위표 (구글시트 복사용) ─────────────────────────────────────────────

let sheetState = { clientId: null, clientName: '', year: 0, month: 0, data: null };

function openSheet(clientId, clientName) {
  const now = new Date();
  sheetState = { clientId, clientName, year: now.getFullYear(), month: now.getMonth() + 1, data: null };
  loadSheet();
  modals.sheetModal.show();
}

function sheetMonth(delta) {
  let m = sheetState.month + delta, y = sheetState.year;
  if (m < 1) { m = 12; y--; }
  if (m > 12) { m = 1; y++; }
  sheetState.month = m; sheetState.year = y;
  loadSheet();
}

async function loadSheet() {
  const { clientId, year, month } = sheetState;
  document.getElementById('sheetMonthLabel').textContent = `${year}년 ${month}월`;
  document.getElementById('sheetModalBody').innerHTML = '<div class="text-muted p-3">불러오는 중...</div>';
  try {
    const data = await api(`/api/clients/${clientId}/sheet?year=${year}&month=${month}`);
    sheetState.data = data;
    renderSheet(data);
  } catch(e) {
    document.getElementById('sheetModalBody').innerHTML = `<div class="text-danger p-3">${esc(e.message)}</div>`;
  }
}

function sheetRows(data) {
  const header = ['순번', '키워드', '구분(노출영역)', '목표순위', '달성일'];
  for (let d = 1; d <= data.days; d++) header.push(`${d}일`);
  const rows = data.keywords.map((k, i) => {
    const cells = [String(i + 1), k.keyword, '플레이스 상위노출', '1~5위', String(k.exposure_count)];
    for (let d = 1; d <= data.days; d++) {
      const v = k.daily[d];
      cells.push(v === undefined || v === null ? '' : String(v));
    }
    return cells;
  });
  return { header, rows };
}

function renderSheet(data) {
  document.getElementById('sheetModalTitle').textContent = `${sheetState.clientName} — 월별 순위표`;
  if (!data.keywords.length) {
    document.getElementById('sheetModalBody').innerHTML = '<div class="text-muted p-3">등록된 검색어가 없습니다</div>';
    return;
  }
  const today = new Date();
  const thisMonth = today.getFullYear() === data.year && (today.getMonth() + 1) === data.month;
  const todayDay = today.getDate();
  const isTodayCol = idx => thisMonth && idx >= 5 && (idx - 4) === todayDay;
  const { header, rows } = sheetRows(data);
  const thead = '<tr>' + header.map((h, idx) =>
    `<th class="text-center ${isTodayCol(idx) ? 'table-warning' : ''}" style="white-space:nowrap">${esc(h)}</th>`
  ).join('') + '</tr>';
  const tbody = rows.map(r => '<tr>' + r.map((c, idx) => {
    const exposed = idx >= 5 && c !== '' && Number(c) <= 5;
    const cls = idx < 5
      ? 'text-nowrap'
      : `text-center ${isTodayCol(idx) ? 'table-warning' : ''} ${exposed ? 'text-success fw-bold' : 'text-muted'}`;
    return `<td class="${cls}">${esc(c)}</td>`;
  }).join('') + '</tr>').join('');
  document.getElementById('sheetModalBody').innerHTML = `
    <p class="small text-muted mb-2">📋 <b>복사</b> 버튼 → 구글시트에서 붙여넣기(Ctrl+V). 값은 그날의 현재 순위(PC 기준), 1~5위는 초록색입니다.</p>
    <table class="table table-sm table-bordered align-middle" style="font-size:.8rem">
      <thead class="table-light">${thead}</thead><tbody>${tbody}</tbody>
    </table>`;
}

async function copySheet() {
  if (!sheetState.data) return;
  const { header, rows } = sheetRows(sheetState.data);
  const tsv = [header, ...rows].map(r => r.join('\t')).join('\n');
  try {
    await navigator.clipboard.writeText(tsv);
    showToast('복사됨! 구글시트에서 Ctrl+V 로 붙여넣으세요', 'success');
  } catch(e) {
    showToast('자동 복사 실패 — 표를 마우스로 드래그해 복사하세요', 'warning');
  }
}

// ── 토스트 ───────────────────────────────────────────────────────────────────

function showToast(msg, type='info') {
  const id = 'toast_' + Date.now();
  const colors = {success:'#198754', danger:'#dc3545', warning:'#ffc107', info:'#0dcaf0', secondary:'#6c757d'};
  const el = document.createElement('div');
  el.id = id;
  el.style.cssText = `background:${colors[type]||'#333'};color:#fff;padding:.75rem 1.25rem;border-radius:8px;
    margin-bottom:.5rem;box-shadow:0 4px 12px rgba(0,0,0,.2);max-width:350px;font-size:.9rem;`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ── 초기화 ───────────────────────────────────────────────────────────────────

loadDashboard();
setInterval(loadDashboard, 60000); // 1분마다 새로고침
</script>
